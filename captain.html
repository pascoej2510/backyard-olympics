<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain Score Entry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone">
    <h1>🏆 Captain Score Entry</h1>
    <h2 id="teamName">Team</h2>
    <p>Submit points for your team. This starter version saves scores to the same device/browser.</p>
    <div class="score-buttons">
      <button onclick="captainAdd(1)">+1</button>
      <button onclick="captainAdd(3)">+3</button>
      <button onclick="captainAdd(5)">+5</button>
      <button onclick="captainAdd(10)">+10</button>
    </div>
    <button class="danger" onclick="captainAdd(-1)">-1</button>
    <p class="captain-score">Current Team Score: <span id="captainScore">0</span></p>
    <a href="index.html">View Main Scoreboard</a>
  </div>
  <script src="app.js"></script>
</body>
</html>
