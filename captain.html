<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain Score Entry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="captain">
  <div class="captain-shell glass">
    <div class="section-label">Captain Mode</div>
    <h1 id="teamName">Team</h1>
    <p>Tap to submit points for your team.</p>

    <div class="captain-score">
      <span>Current Score</span>
      <strong id="captainScore">0</strong>
      <small>points</small>
    </div>

    <div class="score-buttons">
      <button onclick="captainAdd(1)">+1</button>
      <button onclick="captainAdd(3)">+3</button>
      <button onclick="captainAdd(5)">+5</button>
      <button onclick="captainAdd(10)">+10</button>
    </div>

    <button class="danger full" onclick="captainAdd(-1)">Subtract 1</button>
    <a href="index.html" class="nav-button full-link">View TV Display</a>
  </div>
  <script src="app.js"></script>
</body>
</html>
